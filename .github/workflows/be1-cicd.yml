name: CI/CD - BE1 Deploy to Render

on:
  push:
    branches: [main]           # Deploy khi merge vào main
    paths:
      - "BE1/**"               # Chỉ trigger khi có thay đổi trong folder BE1
  pull_request:
    branches: [main]
    paths:
      - "BE1/**"               # Chỉ chạy CI khi PR có thay đổi trong BE1

jobs:
  # ─── JOB 1: Build & Test ────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        working-directory: BE1
        run: dotnet restore

      - name: Build
        working-directory: BE1
        run: dotnet build --no-restore --configuration Release

      # Bỏ comment nếu có project test
      # - name: Run Tests
      #   working-directory: BE1
      #   run: dotnet test --no-build --configuration Release --verbosity normal

  # ─── JOB 2: Deploy lên Render ───────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: build                            # Chỉ deploy khi build thành công
    if: github.ref == 'refs/heads/main'     # Chỉ deploy khi push/merge vào main

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          echo "HTTP Status: $HTTP_CODE"
          cat response.json

          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
            echo "❌ Deploy thất bại! HTTP status: $HTTP_CODE"
            exit 1
          fi

          echo "✅ Deploy trigger thành công!"